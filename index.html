<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Flashcards de Tags HTML</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Aprendendo Tags HTML</h1>
  <div class="flashcard-container">
    <div class="flashcard" onclick="flipCard(this)">
      <div class="front">
        <p>&lt;p&gt;</p>
      </div>
      <div class="back">
        <p>Usada para criar parágrafos de texto.</p>
      </div>
    </div>

    <div class="flashcard" onclick="flipCard(this)">
      <div class="front">
        <p>&lt;h1&gt;</p>
      </div>
      <div class="back">
        <p>Define um título principal na página.</p>
      </div>
    </div>

    <div class="flashcard" onclick="flipCard(this)">
      <div class="front">
        <p>&lt;a&gt;</p>
      </div>
      <div class="back">
        <p>Cria links para outras páginas ou sites.</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
